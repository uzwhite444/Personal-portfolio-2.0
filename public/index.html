<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Muhammadabdulloh Khasanov - Creative Frontend Developer & Web Designer specializing in modern, interactive web experiences" />
  <meta name="keywords" content="frontend developer, web designer, react developer, portfolio, web development" />
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Muhammadabdulloh - Frontend Developer" />
  <meta property="og:description" content="Creative Frontend Developer crafting exceptional web experiences" />
  <meta property="og:type" content="website" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  
  <title>Muhammadabdulloh - Frontend Developer</title>
  
  <style>
    /* Critical CSS for faster initial render */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: #0a0a0f;
      overflow-x: hidden;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading animation */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    .loader-hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  
  <!-- Loader -->
  <div class="loader" id="loader">
    <svg width="50" height="50" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="20" stroke="#00ff88" stroke-width="3" fill="none" 
              stroke-dasharray="125.6" stroke-dashoffset="125.6">
        <animate attributeName="stroke-dashoffset" from="125.6" to="0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>
  
  <div id="root"></div>
  
  <script>
    // Hide loader when page is loaded
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('loader-hidden');
      }, 500);
    });
  </script>
</body>
</html>
